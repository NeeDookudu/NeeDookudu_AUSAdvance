name: AUS Box Office Scraper

on:
  schedule:
    # Runs every hour at :00 (UTC)
    - cron: '0 * * * *'

  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    name: Scrape & Commit
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Fetch full history so git push works cleanly
          fetch-depth: 1

      # ── 2. Python setup ───────────────────────────────────────────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      # ── 3. Install dependencies ───────────────────────────────────────────
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install aiohttp

      # ── 4. Run scraper ────────────────────────────────────────────────────
      - name: Run aus.py
        run: python aus.py

      # ── 5. Check if new files were produced ───────────────────────────────
      - name: Check for changes
        id: changes
        run: |
          git add snapshots-au-combined/
          if git diff --cached --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No new snapshot files — nothing to commit."
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "New snapshot files detected."
          fi

      # ── 6. Commit & push ─────────────────────────────────────────────────
      - name: Commit and push snapshot
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "snapshot: $(date -u +'%Y-%m-%dT%H:%M:%SZ') [skip ci]"
          git push
